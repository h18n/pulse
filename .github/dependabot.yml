version: 2
updates:
  # Maintain Root dependencies (Concurrently, Husky)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"

  # Maintain Next.js UI
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ui"

  # Maintain Backend Microservices
  - package-ecosystem: "npm"
    directory: "/apps/alert-ingestion"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/apps/ai-engine"
    schedule:
      interval: "weekly"
      
  - package-ecosystem: "npm"
    directory: "/apps/config-manager"
    schedule:
      interval: "weekly"

  # Maintain Docker images in Compose
  - package-ecosystem: "docker"
    directory: "/infra"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
